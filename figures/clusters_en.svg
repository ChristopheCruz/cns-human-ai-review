<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:Arial,sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Central node -->
<rect x="255" y="195" width="170" height="54" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text font-size="14" font-weight="600" x="340" y="219" text-anchor="middle" fill="#3C3489">Human-AI Systems</text>
<text font-size="12" x="340" y="237" text-anchor="middle" fill="#534AB7">Central integrative node</text>

<!-- Cluster A -->
<rect x="30" y="30" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="125" y="52" text-anchor="middle" fill="#085041">A — Theoretical Foundations</text>
<text font-size="11" x="125" y="70" text-anchor="middle" fill="#0F6E56">CNS, graphs, multiplex lexicon</text>

<!-- Cluster B -->
<rect x="460" y="30" width="190" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="555" y="52" text-anchor="middle" fill="#712B13">B — LLM / AI Auditing</text>
<text font-size="11" x="555" y="70" text-anchor="middle" fill="#993C1D">Bias, forma mentis, GPT</text>

<!-- Cluster C -->
<rect x="460" y="390" width="190" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="555" y="412" text-anchor="middle" fill="#633806">C — Collective Intelligence</text>
<text font-size="11" x="555" y="430" text-anchor="middle" fill="#854F0B">Social networks, AI agents</text>

<!-- Cluster D -->
<rect x="30" y="390" width="190" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="125" y="412" text-anchor="middle" fill="#72243E">D — Social &amp; Emotional AI</text>
<text font-size="11" x="125" y="430" text-anchor="middle" fill="#993556">Mental health, COVID, sentiment</text>

<!-- Cluster E -->
<rect x="225" y="390" width="220" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text font-size="13" font-weight="600" x="335" y="412" text-anchor="middle" fill="#0C447C">E — Education &amp; Creativity</text>
<text font-size="11" x="335" y="430" text-anchor="middle" fill="#185FA5">Semantic memory, augmentation</text>

<!-- Arrows to center -->
<path d="M220 74 Q260 120 270 195" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M460 74 Q430 120 410 195" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M460 415 Q430 330 410 249" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M220 415 Q270 340 285 249" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="390" x2="340" y2="249" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Cross-cluster dashed -->
<path d="M220 57 Q340 18 460 57" fill="none" stroke="#B4B2A9" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
<path d="M555 86 Q600 220 555 390" fill="none" stroke="#B4B2A9" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>

<!-- Legend -->
<line x1="50" y1="178" x2="90" y2="178" stroke="#888780" stroke-width="0.9" marker-end="url(#arrow)"/>
<text font-size="11" x="96" y="182" fill="#5F5E5A">contribution to central node</text>
<line x1="50" y1="198" x2="90" y2="198" stroke="#B4B2A9" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>
<text font-size="11" x="96" y="202" fill="#5F5E5A">cross-cluster methodological link</text>
</svg>
