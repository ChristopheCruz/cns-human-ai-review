<text font-size="10" x="90" y="436" text-anchor="middle" fill="#0F6E56">Foundations</text>

<rect x="144" y="406" width="80" height="38" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text font-size="12" font-weight="600" x="184" y="422" text-anchor="middle" fill="#712B13">B</text>
<text font-size="10" x="184" y="436" text-anchor="middle" fill="#993C1D">LLM Audit</text>

<rect x="238" y="406" width="80" height="38" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text font-size="12" font-weight="600" x="278" y="422" text-anchor="middle" fill="#633806">C</text>
<text font-size="10" x="278" y="436" text-anchor="middle" fill="#854F0B">Collective</text>

<rect x="332" y="406" width="80" height="38" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="0.8"/>
<text font-size="12" font-weight="600" x="372" y="422" text-anchor="middle" fill="#72243E">D</text>
<text font-size="10" x="372" y="436" text-anchor="middle" fill="#993556">Emotional</text>

<rect x="426" y="406" width="80" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text font-size="12" font-weight="600" x="466" y="422" text-anchor="middle" fill="#0C447C">E</text>
<text font-size="10" x="466" y="436" text-anchor="middle" fill="#185FA5">Education</text>

<!-- Arrows from included to clusters -->
<line x1="220" y1="360" x2="90"  y2="406" stroke="#B4B2A9" stroke-width="0.6" marker-end="url(#arrow2)"/>
<line x1="220" y1="360" x2="184" y2="406" stroke="#B4B2A9" stroke-width="0.6" marker-end="url(#arrow2)"/>
<line x1="220" y1="360" x2="278" y2="406" stroke="#B4B2A9" stroke-width="0.6" marker-end="url(#arrow2)"/>
<line x1="220" y1="360" x2="372" y2="406" stroke="#B4B2A9" stroke-width="0.6" marker-end="url(#arrow2)"/>
<line x1="220" y1="360" x2="466" y2="406" stroke="#B4B2A9" stroke-width="0.6" marker-end="url(#arrow2)"/>

<!-- PRISMA label -->
<text font-size="11" x="590" y="510" text-anchor="middle" fill="#B4B2A9">PRISMA 2020</text>
</svg>
